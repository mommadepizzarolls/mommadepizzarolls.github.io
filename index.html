<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Important Swamp Business</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#ff69b4;
    font-family:"Comic Sans MS", cursive, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow-x:hidden;
    overflow-y:auto;

    padding:20px;
}

.container{
    width:100%;
    max-width:650px;

    text-align:center;

    background:rgba(255,255,255,0.08);

    padding:24px;
    border-radius:24px;

    backdrop-filter:blur(4px);
}

.shrek{
    width:280px;
    max-width:80vw;

    margin-bottom:10px;

    filter:
        drop-shadow(0 0 15px rgba(255,255,255,0.5))
        drop-shadow(0 0 25px hotpink);
}

h1{
    color:white;

    font-size:1.8rem;
    line-height:1.2;

    margin-bottom:12px;

    text-shadow:
        0 0 8px #00ff66,
        2px 2px 0 #000;
}

.subtitle{
    color:white;

    font-size:1.15rem;

    margin-bottom:24px;

    text-shadow:2px 2px 0 #000;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:16px;
    flex-wrap:wrap;
}

button{
    border:none;

    padding:12px 28px;

    border-radius:16px;

    font-size:1rem;
    font-weight:bold;

    cursor:pointer;

    transition:0.2s;
}

#yesBtn{
    background:#3cff7a;
}

#yesBtn:hover{
    transform:scale(1.05);
}

#noBtn{
    background:#1f9e52;
    color:white;
    position:relative;
}

.success{
    display:none;
}

.success h1{
    font-size:2.5rem;
}

.success p{
    color:white;

    font-size:1.3rem;

    margin-top:16px;

    text-shadow:2px 2px 0 #000;
}

.insta{
    display:inline-block;

    margin-top:20px;

    background:#00c853;

    color:white;

    text-decoration:none;

    padding:12px 20px;

    border-radius:14px;

    font-size:1.1rem;

    transition:0.2s;
}

.insta:hover{
    transform:scale(1.05);
}

@media (max-width: 600px){

    .container{
        max-width:95%;
        padding:18px;
    }

    .shrek{
        width:220px;
    }

    h1{
        font-size:1.4rem;
    }

    .subtitle{
        font-size:1rem;
    }

    button{
        font-size:0.9rem;
        padding:10px 20px;
    }

    .success h1{
        font-size:2rem;
    }

    .success p{
        font-size:1.1rem;
    }
}

</style>
</head>

<body>

<div class="container" id="mainPage">

    <img src="shrek.png" class="shrek" alt="Shrek">

    <h1>
        What are you doing in my swamp?<br>
        More importantly, what are you doing this weekend?
    </h1>

    <p class="subtitle">
        me, you, Burger Factory next week? 🥺
    </p>

    <div class="buttons">
        <button id="yesBtn">💚 Yes</button>
        <button id="noBtn">💔 No</button>
    </div>

</div>

<div class="container success" id="successPage">

    <img src="shrek.png" class="shrek" alt="Shrek">

    <h1>yay</h1>

    <p>
        <br><br>
        text me :)
    </p>

    <a
        class="insta"
        href="https://www.instagram.com/__royale.with.cheese__/"
        target="_blank"
    >
        @__royale.with.cheese__
    </a>

</div>

<script>

const noBtn = document.getElementById("noBtn");

function moveNoButton(){

    const rect = noBtn.getBoundingClientRect();

    const maxX = window.innerWidth - rect.width;
    const maxY = window.innerHeight - rect.height;

    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

document.addEventListener("mousemove",(e)=>{

    const rect = noBtn.getBoundingClientRect();

    const dx = e.clientX - (rect.left + rect.width/2);
    const dy = e.clientY - (rect.top + rect.height/2);

    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < 120){
        moveNoButton();
    }
});

noBtn.addEventListener("touchstart",(e)=>{
    e.preventDefault();
    moveNoButton();
});

document.getElementById("yesBtn").addEventListener("click",()=>{

    document.getElementById("mainPage").style.display = "none";
    document.getElementById("successPage").style.display = "block";

    window.scrollTo(0,0);

});

</script>

</body>
</html>
